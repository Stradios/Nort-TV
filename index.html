<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nort TV</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080c10;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.08);
  --border-focus: rgba(100,170,255,0.65);
  --accent: #4a9eff;
  --accent-dim: rgba(74,158,255,0.13);
  --text-primary: rgba(255,255,255,0.92);
  --text-secondary: rgba(255,255,255,0.45);
  --text-dim: rgba(255,255,255,0.22);
  --card-w: 180px;
  --card-h: 126px;
  --ease: 170ms ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;cursor:none;}

#wallpaper{position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;opacity:0;transition:opacity 1.6s ease;}
#wallpaper.loaded{opacity:1;}
#veil{position:fixed;inset:0;z-index:1;
  background:linear-gradient(160deg,rgba(8,12,16,0.84) 0%,rgba(8,12,16,0.62) 50%,rgba(8,12,16,0.90) 100%);}

#app{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;padding:44px 68px 36px;overflow:hidden;}

#topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:46px;animation:fadeDown .45s ease both;}
#logo{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:500;letter-spacing:6px;text-transform:uppercase;color:var(--text-primary);}
#logo span{color:var(--accent);}
#clock-wrap{text-align:right;}
.clk-time{font-size:40px;font-weight:200;color:var(--text-primary);letter-spacing:-1px;line-height:1;}
.clk-date{font-size:12px;font-weight:300;color:var(--text-secondary);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;}

.section{margin-bottom:36px;animation:fadeUp .45s ease both;}
.section:nth-child(2){animation-delay:.05s;}
.section:nth-child(3){animation-delay:.10s;}
.section:nth-child(4){animation-delay:.15s;}
.sec-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:400;letter-spacing:3.5px;text-transform:uppercase;color:var(--text-secondary);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}
.card-row{display:flex;gap:14px;flex-wrap:nowrap;}

.card{width:var(--card-w);height:var(--card-h);flex-shrink:0;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  cursor:pointer;transition:border-color var(--ease),background var(--ease),transform var(--ease),box-shadow var(--ease);
  outline:none;position:relative;overflow:hidden;user-select:none;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent);opacity:0;transition:opacity var(--ease);border-radius:12px 12px 0 0;}
.card:hover,.card.focused{border-color:var(--border-focus);background:var(--surface-hover);
  transform:translateY(-4px) scale(1.02);
  box-shadow:0 0 0 1px rgba(74,158,255,0.18),0 10px 36px rgba(0,0,0,0.55),0 0 44px rgba(74,158,255,0.07);}
.card:hover::before,.card.focused::before{opacity:1;}
.card:active{transform:translateY(-1px) scale(0.99);}

.card-icon{width:42px;height:42px;border-radius:10px;background:var(--accent-dim);
  border:1px solid rgba(74,158,255,0.18);display:flex;align-items:center;justify-content:center;
  font-size:20px;overflow:hidden;transition:background var(--ease);}
.card-icon img{width:28px;height:28px;object-fit:contain;border-radius:4px;}
.card:hover .card-icon,.card.focused .card-icon{background:rgba(74,158,255,0.20);}

.card.s-card .card-icon{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.10);}
.card.s-card:hover,.card.s-card.focused{border-color:rgba(255,255,255,0.32);
  box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 10px 36px rgba(0,0,0,0.55);}
.card.s-card::before{background:rgba(255,255,255,0.55);}
.card.s-card:hover .card-icon,.card.s-card.focused .card-icon{background:rgba(255,255,255,0.10);}

.card.add-card{border-style:dashed;border-color:rgba(255,255,255,0.10);}
.card.add-card .card-icon{background:transparent;border-color:rgba(255,255,255,0.10);color:var(--text-dim);font-size:22px;}
.card.add-card .card-label{color:var(--text-dim);font-size:12px;}
.card.add-card:hover,.card.add-card.focused{border-style:solid;border-color:rgba(255,255,255,0.22);box-shadow:0 8px 28px rgba(0,0,0,0.4);}
.card.add-card::before{background:rgba(255,255,255,0.4);}

.card-label{font-size:12px;font-weight:400;color:var(--text-primary);letter-spacing:0.2px;
  text-align:center;padding:0 8px;line-height:1.3;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

/* Edit pencil badge — visible only when card is focused */
.edit-badge{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:6px;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);
  display:none;align-items:center;justify-content:center;font-size:11px;
  color:rgba(255,255,255,0.65);z-index:5;transition:background .15s ease;}
.card.focused .edit-badge{display:flex;}
.edit-badge:hover{background:rgba(74,158,255,0.35);border-color:rgba(74,158,255,0.6);}

#hint{margin-top:auto;display:flex;align-items:center;gap:22px;animation:fadeUp .45s .25s ease both;}
.hint-item{display:flex;align-items:center;gap:7px;color:var(--text-dim);font-size:11px;letter-spacing:1px;text-transform:uppercase;}
.key{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border:1px solid rgba(255,255,255,0.13);border-radius:5px;font-size:10px;
  color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.03);}

#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(16,22,32,0.97);border:1px solid var(--border-focus);border-radius:10px;
  padding:11px 22px;color:var(--text-primary);font-size:13px;
  opacity:0;transition:opacity .2s ease,transform .2s ease;pointer-events:none;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Modal */
.modal-backdrop{position:fixed;inset:0;z-index:300;
  background:rgba(4,8,14,0.80);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s ease;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{width:480px;background:rgba(12,18,28,0.99);border:1px solid rgba(255,255,255,0.11);
  border-radius:18px;padding:34px 38px 30px;display:flex;flex-direction:column;gap:22px;
  transform:translateY(22px) scale(0.97);transition:transform .22s ease;cursor:default;}
.modal-backdrop.open .modal{transform:translateY(0) scale(1);}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:500;
  letter-spacing:3.5px;text-transform:uppercase;color:var(--text-primary);}

.preview-row{display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;padding:14px 16px;}
#preview-icon{width:46px;height:46px;border-radius:10px;background:var(--accent-dim);
  border:1px solid rgba(74,158,255,0.18);display:flex;align-items:center;justify-content:center;
  font-size:22px;overflow:hidden;flex-shrink:0;}
#preview-icon img{width:30px;height:30px;object-fit:contain;border-radius:4px;}
#preview-name{font-size:15px;font-weight:400;color:var(--text-primary);}
#preview-sub{font-size:11px;color:var(--text-secondary);margin-top:3px;
  max-width:300px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

.field{display:flex;flex-direction:column;gap:7px;}
.field label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);}
.field input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);
  border-radius:9px;padding:11px 14px;color:var(--text-primary);font-family:'Outfit',sans-serif;
  font-size:14px;outline:none;transition:border-color .15s ease;}
.field input:focus{border-color:var(--border-focus);}
.field input::placeholder{color:var(--text-dim);}

#fetch-status{font-size:12px;min-height:16px;transition:color .2s ease;}
#fetch-status.ok{color:#4ade80;}
#fetch-status.err{color:#f87171;}
#fetch-status.loading{color:var(--text-secondary);}

.modal-actions{display:flex;gap:10px;margin-top:2px;}
.btn{flex:1;padding:12px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;
  font-weight:400;letter-spacing:0.4px;cursor:pointer;border:1px solid;transition:background .15s,border-color .15s;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:#5ba8ff;}
.btn-primary:disabled{background:rgba(74,158,255,0.22);border-color:rgba(74,158,255,0.22);color:rgba(255,255,255,0.28);cursor:not-allowed;}
.btn-ghost{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.10);color:var(--text-secondary);}
.btn-ghost:hover{background:rgba(255,255,255,0.09);}
.btn-danger{background:rgba(255,70,70,0.10);border-color:rgba(255,70,70,0.22);color:#ff8080;}
.btn-danger:hover{background:rgba(255,70,70,0.20);}

@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="wallpaper"></div>
<div id="veil"></div>

<div id="app">
  <div id="topbar">
    <div id="logo">N<span>O</span>RT TV</div>
    <div id="clock-wrap">
      <div class="clk-time" id="time">--:--</div>
      <div class="clk-date" id="date">&nbsp;</div>
    </div>
  </div>

  <!-- Web Apps -->
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">Web Apps</span>
      <div class="sec-line"></div>
    </div>
    <div class="card-row" id="row-web">
      <div class="card add-card" id="add-web-btn" tabindex="0">
        <div class="card-icon">＋</div>
        <div class="card-label">Add web app</div>
      </div>
    </div>
  </div>

  <!-- Linux Apps -->
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">Linux Apps</span>
      <div class="sec-line"></div>
    </div>
    <div class="card-row" id="row-linux">
      <div class="card" id="card-flathub" tabindex="0">
        <div class="card-icon">
          <img src="https://flathub.org/favicon.ico" alt="Flathub" onerror="this.parentElement.textContent='📦'"/>
        </div>
        <div class="card-label">Flathub</div>
      </div>
      <div class="card add-card" id="add-linux-btn" tabindex="0">
        <div class="card-icon">＋</div>
        <div class="card-label">Add app</div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">Settings</span>
      <div class="sec-line"></div>
    </div>
    <div class="card-row" id="row-settings">
      <div class="card s-card" tabindex="0"><div class="card-icon">🖥</div><div class="card-label">Display</div></div>
      <div class="card s-card" tabindex="0"><div class="card-icon">📡</div><div class="card-label">Network</div></div>
      <div class="card s-card" tabindex="0"><div class="card-icon">🔊</div><div class="card-label">Sound</div></div>
      <div class="card s-card" tabindex="0"><div class="card-icon">🖼</div><div class="card-label">Wallpaper</div></div>
      <div class="card s-card" tabindex="0"><div class="card-icon">🎮</div><div class="card-label">Remote & Input</div></div>
      <div class="card s-card" tabindex="0"><div class="card-icon">⚙️</div><div class="card-label">System</div></div>
    </div>
  </div>

  <div id="hint">
    <div class="hint-item"><span class="key">←</span><span class="key">→</span><span class="key">↑</span><span class="key">↓</span> Navigate</div>
    <div class="hint-item"><span class="key">↵</span> Select</div>
    <div class="hint-item"><span class="key">Esc</span> Close</div>
  </div>
</div>

<!-- Add / Edit modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add web app</div>

    <div class="preview-row">
      <div id="preview-icon">🌐</div>
      <div>
        <div id="preview-name">Enter a URL to begin</div>
        <div id="preview-sub">Icon and name load automatically</div>
      </div>
    </div>

    <div class="field">
      <label>URL</label>
      <input type="url" id="input-url" placeholder="https://example.com" autocomplete="off" spellcheck="false"/>
    </div>

    <div id="fetch-status"></div>

    <div class="field">
      <label>Name &nbsp;<span style="color:var(--text-dim);font-size:10px;letter-spacing:1px;text-transform:none;">auto-filled · editable</span></label>
      <input type="text" id="input-name" placeholder="App name" autocomplete="off"/>
    </div>

    <div class="modal-actions" id="modal-actions">
      <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-save" disabled>Add app</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Wallpaper ─────────────────────────────────────────────────────────
const wp = document.getElementById('wallpaper');
const bgSrc = 'https://raw.githubusercontent.com/Stradios/Nort-sun-esentials/main/Watchtower%20Distantbackground.png';
wp.style.backgroundImage = `url('${bgSrc}')`;
const preloader = new Image();
preloader.onload = () => wp.classList.add('loaded');
preloader.src = bgSrc;

// ── Clock ─────────────────────────────────────────────────────────────
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function tick(){
  const n=new Date();
  document.getElementById('time').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('date').textContent=`${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}`;
}
tick(); setInterval(tick,10000);

// ── Persistent storage ────────────────────────────────────────────────
let webApps = [];
try { webApps = JSON.parse(localStorage.getItem('nort-webapps') || '[]'); } catch{}
function save(){ localStorage.setItem('nort-webapps', JSON.stringify(webApps)); }

// ── Render web app cards ──────────────────────────────────────────────
function renderWebApps(){
  const row = document.getElementById('row-web');
  const addBtn = document.getElementById('add-web-btn');
  row.querySelectorAll('.card:not(.add-card)').forEach(c => c.remove());

  webApps.forEach(app => {
    const card = document.createElement('div');
    card.className = 'card';
    card.tabIndex = 0;
    card.dataset.id = app.id;

    // Icon
    const iconEl = document.createElement('div');
    iconEl.className = 'card-icon';
    if(app.icon){
      const im = document.createElement('img');
      im.src = app.icon; im.alt = app.name;
      im.onerror = () => { iconEl.innerHTML = '🌐'; };
      iconEl.appendChild(im);
    } else {
      iconEl.textContent = '🌐';
    }

    // Label
    const lbl = document.createElement('div');
    lbl.className = 'card-label';
    lbl.textContent = app.name;

    // Edit badge
    const badge = document.createElement('div');
    badge.className = 'edit-badge';
    badge.innerHTML = '✏';
    badge.title = 'Edit';
    badge.addEventListener('click', e => { e.stopPropagation(); openModal(app.id); });

    card.appendChild(iconEl);
    card.appendChild(lbl);
    card.appendChild(badge);
    card.addEventListener('click', () => showToast(`Opening ${app.name}…`));

    row.insertBefore(card, addBtn);
  });

  rebuildNav();
}

// ── Favicon + title lookup ────────────────────────────────────────────
function normaliseUrl(raw){
  let u = raw.trim();
  if(!u) return null;
  if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
  try { return new URL(u).href; } catch { return null; }
}

async function fetchSiteInfo(rawUrl){
  const url = normaliseUrl(rawUrl);
  if(!url) return null;
  const origin = new URL(url).origin;
  const faviconUrl = `https://www.google.com/s2/favicons?domain=${origin}&sz=64`;
  let title = new URL(url).hostname.replace('www.','');

  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(7000) });
    if(res.ok){
      const d = await res.json();
      const m = d.contents?.match(/<title[^>]*>([^<]{1,80})<\/title>/i);
      if(m) title = m[1].trim().replace(/\s*[-|–|·]\s*.+$/, '').trim() || title;
    }
  } catch {}

  return { url, faviconUrl, title };
}

// ── Modal ─────────────────────────────────────────────────────────────
let editingId = null;
let fetchTimer = null;
let resolvedInfo = null;

function openModal(editId = null){
  editingId = editId;
  resolvedInfo = null;

  const backdrop = document.getElementById('modal-backdrop');
  const titleEl  = document.getElementById('modal-title');
  const btnSave  = document.getElementById('btn-save');
  const actions  = document.getElementById('modal-actions');
  const urlIn    = document.getElementById('input-url');
  const nameIn   = document.getElementById('input-name');
  const status   = document.getElementById('fetch-status');

  urlIn.value = ''; nameIn.value = '';
  status.textContent = ''; status.className = '';
  document.getElementById('preview-name').textContent = 'Enter a URL to begin';
  document.getElementById('preview-sub').textContent  = 'Icon and name load automatically';
  document.getElementById('preview-icon').innerHTML = '🌐';
  btnSave.disabled = true;

  // Remove stale delete button
  document.getElementById('btn-delete')?.remove();

  if(editId){
    const app = webApps.find(a => a.id === editId);
    if(!app) return;
    titleEl.textContent  = 'Edit web app';
    btnSave.textContent  = 'Save changes';
    urlIn.value          = app.url;
    nameIn.value         = app.name;
    document.getElementById('preview-name').textContent = app.name;
    document.getElementById('preview-sub').textContent  = app.url;
    if(app.icon){
      const im = document.createElement('img');
      im.src = app.icon; im.alt = app.name;
      im.onerror = () => { document.getElementById('preview-icon').textContent='🌐'; };
      document.getElementById('preview-icon').innerHTML = '';
      document.getElementById('preview-icon').appendChild(im);
    }
    resolvedInfo = { url: app.url, faviconUrl: app.icon, title: app.name };
    btnSave.disabled = false;

    const delBtn = document.createElement('button');
    delBtn.id = 'btn-delete';
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    delBtn.addEventListener('click', () => {
      webApps = webApps.filter(a => a.id !== editId);
      save(); renderWebApps(); closeModal();
      showToast('App removed');
    });
    actions.insertBefore(delBtn, document.getElementById('btn-cancel'));
  } else {
    titleEl.textContent = 'Add web app';
    btnSave.textContent = 'Add app';
  }

  backdrop.classList.add('open');
  setTimeout(() => urlIn.focus(), 230);
}

function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  clearTimeout(fetchTimer);
  editingId = null;
  resolvedInfo = null;
}

// URL input → live fetch
document.getElementById('input-url').addEventListener('input', function(){
  const val = this.value.trim();
  const status  = document.getElementById('fetch-status');
  const btnSave = document.getElementById('btn-save');
  resolvedInfo  = null;
  btnSave.disabled = true;
  clearTimeout(fetchTimer);
  if(!val){ status.textContent=''; return; }
  status.textContent = 'Looking up site…'; status.className = 'loading';

  fetchTimer = setTimeout(async () => {
    const info = await fetchSiteInfo(val);
    if(!info){
      status.textContent = 'Could not reach that URL — check and try again';
      status.className = 'err'; return;
    }
    resolvedInfo = info;

    // Update preview
    const piEl = document.getElementById('preview-icon');
    piEl.innerHTML = '';
    const im = document.createElement('img');
    im.src = info.faviconUrl; im.alt = info.title;
    im.onerror = () => { piEl.textContent = '🌐'; };
    piEl.appendChild(im);
    document.getElementById('preview-name').textContent = info.title;
    document.getElementById('preview-sub').textContent  = info.url;

    // Auto-fill name if blank
    const nameIn = document.getElementById('input-name');
    if(!nameIn.value) nameIn.value = info.title;

    status.textContent = '✓ Site found — name is editable below';
    status.className = 'ok';
    btnSave.disabled = false;
  }, 900);
});

document.getElementById('input-name').addEventListener('input', function(){
  if(resolvedInfo && this.value.trim())
    document.getElementById('btn-save').disabled = false;
});

// Save
document.getElementById('btn-save').addEventListener('click', () => {
  const name = document.getElementById('input-name').value.trim();
  if(!resolvedInfo || !name) return;

  if(editingId){
    const app = webApps.find(a => a.id === editingId);
    if(app){ app.url = resolvedInfo.url; app.name = name; app.icon = resolvedInfo.faviconUrl; }
  } else {
    webApps.push({ id: Date.now().toString(), name, url: resolvedInfo.url, icon: resolvedInfo.faviconUrl });
  }
  save(); renderWebApps(); closeModal();
  showToast(editingId ? `Updated: ${name}` : `Added: ${name}`);
});

document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-backdrop')) closeModal();
});

// ── Pinned cards ──────────────────────────────────────────────────────
document.getElementById('add-web-btn').addEventListener('click', () => openModal());
document.getElementById('card-flathub').addEventListener('click', () => showToast('Opening Flathub…'));
document.getElementById('add-linux-btn').addEventListener('click', () => showToast('Browse Flathub to find Linux apps'));

// ── D-pad navigation ──────────────────────────────────────────────────
let ROWS = [], fRow = 0, fCol = 0;

function rebuildNav(){
  ROWS = [
    [...document.querySelectorAll('#row-web .card')],
    [...document.querySelectorAll('#row-linux .card')],
    [...document.querySelectorAll('#row-settings .card')],
  ];
  // reattach hover listeners
  ROWS.forEach((row,r) => row.forEach((card,c) =>
    card.addEventListener('mouseenter', () => setFocus(r,c))
  ));
}

function setFocus(r,c){
  if(document.getElementById('modal-backdrop').classList.contains('open')) return;
  r = Math.max(0, Math.min(ROWS.length-1, r));
  c = Math.max(0, Math.min(ROWS[r].length-1, c));
  ROWS[fRow]?.[fCol]?.classList.remove('focused');
  fRow=r; fCol=c;
  ROWS[fRow][fCol]?.classList.add('focused');
  ROWS[fRow][fCol]?.scrollIntoView({block:'nearest',inline:'nearest'});
}

document.addEventListener('keydown', e => {
  const modalOpen = document.getElementById('modal-backdrop').classList.contains('open');
  if(modalOpen){ if(e.key==='Escape') closeModal(); return; }
  switch(e.key){
    case 'ArrowRight': e.preventDefault(); setFocus(fRow, fCol+1); break;
    case 'ArrowLeft':  e.preventDefault(); setFocus(fRow, fCol-1); break;
    case 'ArrowDown':  e.preventDefault(); setFocus(fRow+1, Math.min(fCol, ROWS[Math.min(fRow+1,ROWS.length-1)].length-1)); break;
    case 'ArrowUp':    e.preventDefault(); setFocus(fRow-1, Math.min(fCol, ROWS[Math.max(fRow-1,0)].length-1)); break;
    case 'Enter': case ' ': e.preventDefault(); ROWS[fRow][fCol]?.click(); break;
  }
});

// ── Gamepad ───────────────────────────────────────────────────────────
const gps = {ax:[0,0], bt:Array(17).fill(false)};
window.addEventListener('gamepadconnected', () => {
  setInterval(() => {
    const gp = navigator.getGamepads?.()[0]; if(!gp) return;
    const D=0.4, a0=gp.axes[0], a1=gp.axes[1];
    if(a0>D&&!gps.ax[0]){gps.ax[0]=1;setFocus(fRow,fCol+1);}
    if(a0<-D&&!gps.ax[0]){gps.ax[0]=-1;setFocus(fRow,fCol-1);}
    if(Math.abs(a0)<D) gps.ax[0]=0;
    if(a1>D&&!gps.ax[1]){gps.ax[1]=1;setFocus(fRow+1,fCol);}
    if(a1<-D&&!gps.ax[1]){gps.ax[1]=-1;setFocus(fRow-1,fCol);}
    if(Math.abs(a1)<D) gps.ax[1]=0;
    [[12,()=>setFocus(fRow-1,fCol)],[13,()=>setFocus(fRow+1,fCol)],
     [14,()=>setFocus(fRow,fCol-1)],[15,()=>setFocus(fRow,fCol+1)],
     [0,()=>ROWS[fRow][fCol]?.click()]].forEach(([i,fn])=>{
      if(gp.buttons[i]?.pressed&&!gps.bt[i]){fn();gps.bt[i]=true;}
      if(!gp.buttons[i]?.pressed) gps.bt[i]=false;
    });
  },80);
});

// ── Toast ─────────────────────────────────────────────────────────────
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

// ── Init ──────────────────────────────────────────────────────────────
renderWebApps();
setTimeout(()=>setFocus(0,0),120);
</script>
